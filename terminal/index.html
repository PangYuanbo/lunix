<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' http: https: ws: wss:; style-src 'self' 'unsafe-inline'; script-src 'self' 'wasm-unsafe-eval'" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="dist/terminal.css" />
  <title>Lunix Terminal</title>
</head>
<body>
  <header id="titlebar">
    <div id="tabs"></div>
    <button id="newtab" title="New tab (⌘T)">+</button>
    <span class="grow"></span>
    <span id="status" data-state="connecting">connecting</span>
    <button id="split" title="Split pane (⌘D)">Split</button>
  </header>
  <main id="panes-host"></main>
  <script src="web/bridge.js"></script>
  <script type="module" src="dist/terminal.js"></script>
</body>
</html>
