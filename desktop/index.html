<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>lunix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      html, body { margin: 0; height: 100%; background: #f2f0eb; font-family: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif; }
      .root { position: relative; width: 100%; height: 100vh; overflow: hidden; }
      /* Desktop wallpaper: a warm gradient over a faint dotted grid. */
      .lunix-desktop-shell {
        background-image:
          linear-gradient(rgba(255,255,255,0.48), rgba(242,240,235,0.52) 42%, rgba(232,229,222,0.78)),
          radial-gradient(rgb(217,212,202) 1px, rgba(0,0,0,0) 1px);
        background-size: auto, 44px 44px;
      }
      /* During a window drag/resize, suppress text selection so a fast pointer can't start selecting and fight the drag. */
      body.lunix-dragging, body.lunix-dragging * { user-select: none !important; -webkit-user-select: none !important; }
      .lunix-wordmark { font-weight: 600; font-size: 18px; letter-spacing: -0.01em; color: #24231f; line-height: 24px; }
      .lunix-wordmark b { color: #17796d; font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="root">
      <main class="lunix-desktop-shell">
        <header class="lunix-desktop-topbar">
          <div class="lunix-desktop-brand">
            <button type="button" aria-label="lunix" title="lunix" style="min-height:44px;padding:0;background:none;border:none;cursor:pointer;">
              <span class="lunix-wordmark">lu<b>n</b>ix</span>
            </button>
          </div>
          <div class="lunix-desktop-status"><div class="flex items-center gap-2" style="min-width:0;"></div></div>
        </header>
        <section class="lunix-desktop-surface" id="surface"></section>
        <div id="dock"></div>
      </main>
    </div>
    <script src="/config.js"></script>
    <script src="./nodus-sdk.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
